name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Verify tag is strict semver
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag $TAG is not strict vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

      - name: Verify tag matches version.txt
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          want="${TAG#v}"
          got="$(tr -d '[:space:]' < version.txt)"
          if [[ "$got" != "$want" ]]; then
            echo "tag $TAG disagrees with version.txt ($got)" >&2
            exit 1
          fi

      - name: Validate plugin metadata parity
        env:
          SPRINGFIELD_RELEASE_TAG: ${{ github.ref_name }}
        run: go test ./tests/plugin/...

      - name: Verify hooks/checksums.txt asset names are well-formed
        run: |
          set -euo pipefail
          while read -r expected asset; do
            asset="${asset#./}"
            if [[ ! "$asset" =~ ^springfield_[0-9]+\.[0-9]+\.[0-9]+_(darwin|linux)_(amd64|arm64)\.tar\.gz$ ]]; then
              echo "checksums.txt asset name not well-formed: $asset" >&2
              exit 1
            fi
            if [[ ! "$expected" =~ ^[0-9a-f]{64}$ ]]; then
              echo "checksums.txt hash not well-formed for $asset: $expected" >&2
              exit 1
            fi
          done < hooks/checksums.txt

  build:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          archive="springfield_${version}_${GOOS}_${GOARCH}.tar.gz"
          stage="$(mktemp -d)"

          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -X springfield/cmd.Version=${TAG}" \
            -o "${stage}/springfield" \
            .

          mkdir -p dist
          tar -C "${stage}" -czf "dist/${archive}" springfield

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: springfield-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify plugin checksum manifest against release binaries
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          while read -r expected asset; do
            asset="${asset#./}"
            if [[ ! "$asset" =~ ^springfield_[0-9]+\.[0-9]+\.[0-9]+_(darwin|linux)_(amd64|arm64)\.tar\.gz$ ]]; then
              echo "checksums.txt asset name rejected: $asset" >&2
              exit 1
            fi
            extract_dir="$tmp/${asset%.tar.gz}"
            mkdir -p "$extract_dir"
            tar -C "$extract_dir" -xzf "dist/$asset" springfield
            got="$(sha256sum "$extract_dir/springfield" | cut -d' ' -f1)"
            if [[ "$got" != "$expected" ]]; then
              echo "checksum mismatch for $asset: $got != $expected" >&2
              exit 1
            fi
          done < hooks/checksums.txt

      - name: Pre-publish smoke — extracted binary reports the tagged version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          smoke_dir="$(mktemp -d)"
          tar -C "${smoke_dir}" -xzf "dist/springfield_${version}_linux_amd64.tar.gz" springfield
          chmod +x "${smoke_dir}/springfield"
          out="$("${smoke_dir}/springfield" version)"
          if [[ "$out" != *"${TAG}"* ]]; then
            printf 'pre-publish smoke: %q does not contain %s\n' "$out" "$TAG" >&2
            exit 1
          fi

      - name: Render Homebrew formula
        env:
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          darwin_amd64_sha="$(sha256sum "dist/springfield_${version}_darwin_amd64.tar.gz" | cut -d' ' -f1)"
          darwin_arm64_sha="$(sha256sum "dist/springfield_${version}_darwin_arm64.tar.gz" | cut -d' ' -f1)"
          linux_amd64_sha="$(sha256sum "dist/springfield_${version}_linux_amd64.tar.gz" | cut -d' ' -f1)"
          linux_arm64_sha="$(sha256sum "dist/springfield_${version}_linux_arm64.tar.gz" | cut -d' ' -f1)"

          cat > Formula/springfield.rb <<FORMULA
          class Springfield < Formula
            desc "Plugin-first local CLI for Springfield setup and workflow control"
            homepage "https://github.com/${REPOSITORY}"
            version "${version}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPOSITORY}/releases/download/${TAG}/springfield_${version}_darwin_arm64.tar.gz"
                sha256 "${darwin_arm64_sha}"
              else
                url "https://github.com/${REPOSITORY}/releases/download/${TAG}/springfield_${version}_darwin_amd64.tar.gz"
                sha256 "${darwin_amd64_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${REPOSITORY}/releases/download/${TAG}/springfield_${version}_linux_arm64.tar.gz"
                sha256 "${linux_arm64_sha}"
              else
                url "https://github.com/${REPOSITORY}/releases/download/${TAG}/springfield_${version}_linux_amd64.tar.gz"
                sha256 "${linux_amd64_sha}"
              end
            end

            def install
              bin.install "springfield"
            end

            test do
              assert_match "springfield ${TAG}", shell_output("#{bin}/springfield version")
            end
          end
          FORMULA

      - name: Create GitHub release
        id: gh_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            Formula/springfield.rb

      - name: Post-publish smoke — published assets match committed checksums
        env:
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          smoke_dir="$(mktemp -d)"
          while read -r expected asset; do
            asset="${asset#./}"
            if [[ ! "$asset" =~ ^springfield_[0-9]+\.[0-9]+\.[0-9]+_(darwin|linux)_(amd64|arm64)\.tar\.gz$ ]]; then
              echo "post-publish smoke: rejecting malformed asset name: $asset" >&2
              exit 1
            fi
            url="https://github.com/${REPOSITORY}/releases/download/${TAG}/${asset}"
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent --show-error --location \
                --connect-timeout 10 --max-time 60 \
                -o "${smoke_dir}/${asset}" "${url}"; then
                break
              fi
              echo "post-publish smoke: download attempt ${attempt} failed for ${url}; retrying" >&2
              sleep 5
            done
            if [[ ! -s "${smoke_dir}/${asset}" ]]; then
              echo "post-publish smoke: failed to fetch ${url}" >&2
              exit 1
            fi
            extract="${smoke_dir}/${asset%.tar.gz}"
            mkdir -p "${extract}"
            tar -C "${extract}" -xzf "${smoke_dir}/${asset}" springfield
            got="$(sha256sum "${extract}/springfield" | cut -d' ' -f1)"
            if [[ "${got}" != "${expected}" ]]; then
              echo "post-publish smoke: ${asset} ${got} != ${expected}" >&2
              exit 1
            fi
          done < hooks/checksums.txt
