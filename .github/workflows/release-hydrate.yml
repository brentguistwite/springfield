name: Release PR Hydrate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  hydrate:
    # Only operate on release-please's own branches in this repo. Forks cannot push back anyway.
    if: |
      startsWith(github.head_ref, 'release-please--') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Belt-and-suspenders: GITHUB_TOKEN pushes do not retrigger workflows,
      # but if a maintainer ever rebases or copies our commit, this short-circuits.
      - name: Detect prior hydrate commit
        id: detect
        run: |
          last_msg="$(git log -1 --pretty=%B)"
          if printf '%s' "$last_msg" | grep -q '\[release-sync\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        if: steps.detect.outputs.skip != 'true'
        with:
          go-version-file: go.mod

      - name: Sync derived version artifacts
        if: steps.detect.outputs.skip != 'true'
        run: go run ./cmd/release-sync

      - name: Verify sync is idempotent
        if: steps.detect.outputs.skip != 'true'
        run: go run ./cmd/release-sync -check

      - name: Run plugin parity tests
        if: steps.detect.outputs.skip != 'true'
        run: |
          version="$(tr -d '[:space:]' < version.txt)"
          SPRINGFIELD_RELEASE_TAG="v${version}" go test ./tests/plugin/...

      - name: Commit hydrated artifacts back to release PR
        if: steps.detect.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "release-hydrate: no drift, nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): hydrate plugin manifests + checksums [release-sync]"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
